name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Verify release source
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify release commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          release_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          if ! git merge-base --is-ancestor "$release_commit" origin/main; then
            echo "Release tag must point to a commit contained in origin/main." >&2
            exit 1
          fi

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify tag and versions
        id: version
        run: node apps/desktop/scripts/verify-release-version.mjs "$GITHUB_REF_NAME"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            slug: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS x64
            slug: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
          - name: Windows x64
            slug: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            slug: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: Linux arm64
            slug: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2 file

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.2

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install 1.88.0 --profile minimal --no-self-update
          rustup override set 1.88.0
          rustup target add "${{ matrix.target }}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package platform release
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
        run: pnpm release:github

      - name: Preserve platform artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.slug }}
          path: dist/
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish cross-platform release
    needs:
      - prepare
      - build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download all platform artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify complete release set
        run: node apps/desktop/scripts/verify-release-assets.mjs release-assets "${{ needs.prepare.outputs.version }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_notes="$(cat <<'EOF'
          ## 対応プラットフォーム

          - macOS: Apple Silicon / Intel（ad-hoc署名の`.app.zip`）
          - Windows: x64（NSIS installer）
          - Linux: x64 / arm64（AppImage、Debian package）

          各artifactには同名の`.sha256`があります。ダウンロード後にSHA-256を照合してください。

          ## 署名について

          この自動releaseはsecretを必要としないunsigned / ad-hoc buildです。macOSでは初回起動時に「プライバシーとセキュリティ」から許可が必要です。WindowsではSmartScreenの警告が表示される場合があります。
          EOF
          )"
          gh release create "$GITHUB_REF_NAME" \
            release-assets/Clockhand-* \
            --title "Clockhand ${VERSION}" \
            --verify-tag \
            --fail-on-no-commits \
            --generate-notes \
            --notes "$release_notes" \
            --latest
