name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust quality
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Rust
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy --no-self-update
          rustup override set 1.88.0

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Cargo audit
        run: cargo audit

  rust-platform:
    name: Rust (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
          - name: Windows x64
            os: windows-2022
          - name: Linux x64
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install 1.88.0 --profile minimal --no-self-update
          rustup override set 1.88.0

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo test
        run: cargo test --workspace -- --test-threads=1

  node:
    name: Node
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.2

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Production dependency audit
        run: pnpm audit --prod

      - name: Build desktop frontend
        run: pnpm --filter desktop build
