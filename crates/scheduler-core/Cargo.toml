[package]
name = "scheduler-core"
version = "0.2.1"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
chrono.workspace = true
chrono-tz.workspace = true
croner.workspace = true
